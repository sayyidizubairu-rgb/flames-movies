<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Upload - Flamez Movies</title>
  <style>
    body{font-family:Inter,system-ui,Segoe UI,Arial;background:#081018;color:#e6eef6;margin:0;padding:20px}
    .card{max-width:720px;margin:36px auto;padding:18px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03)}
    label{display:block;margin-top:12px;color:#cbd5e1}
    input[type=text],textarea,input[type=file],input[type=url]{width:100%;box-sizing:border-box;padding:10px;margin-top:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    .check-label{display:flex;align-items:flex-start;gap:10px}
    .check-label input{margin-top:3px}
    button{margin-top:14px;padding:10px 14px;border-radius:10px;border:none;background:#ff4d2d;color:#111;font-weight:700;cursor:pointer}
    .muted{color:#94a3b8;font-size:13px;margin-top:8px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .logout{margin:0;background:rgba(255,255,255,0.08);color:#e6eef6}
    a{color:#ffb8a8}
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div>
        <h2>Admin upload</h2>
        <div class="muted"><a href="/">View public catalog</a></div>
      </div>
      <form method="post" action="/admin/logout">
        <button class="logout" type="submit">Log out</button>
      </form>
    </div>
    <p class="muted">Upload a movie file you have the rights to distribute. The file will be stored on this server and added to the catalog.</p>
    <form id="uploadForm" method="post" action="/upload" enctype="multipart/form-data">
      <label>Title<input id="uploadTitle" type="text" name="title" placeholder="Movie title" required></label>
      <label>Series name (optional)<input id="seriesTitle" type="text" name="series_title" placeholder="Use the same name for every episode"></label>
      <label>Episode label (optional)<input id="episodeLabel" type="text" name="episode_label" placeholder="Episode 1, S01E02, Finale"></label>
      <label>Description<textarea id="uploadDescription" name="description" rows="3" placeholder="Short description"></textarea></label>
      <label>File<input id="uploadFile" type="file" name="file" accept="video/*"></label>
      <label>External URL (optional)<input id="uploadUrl" type="url" name="url" placeholder="https://example.com/movie.mp4"></label>
      <label class="check-label"><input id="showOnHomepage" type="checkbox" checked><span>Show on homepage</span></label>
      <label class="check-label"><input id="showInPopular" type="checkbox"><span>Show in Most Popular</span></label>
      <button type="submit">Upload</button>
    </form>
    <div class="muted">Uncheck homepage visibility when a movie should appear only after visitors search for it.</div>
    <section id="movieGrid" style="margin-top:24px"></section>
  </div>
  <script src="/script.js"></script>
</body>
</html>
